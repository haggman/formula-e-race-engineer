<svg viewBox="0 0 1400 830" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f6368"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1400" height="830" fill="#ffffff"/>

  <!-- title -->
  <text x="40" y="46" font-size="24" font-weight="700" fill="#202124">Formula E Race Engineer — what's running in your project</text>
  <text x="40" y="70" font-size="14" fill="#5f6368">Berlin 2024 R10 replays live through your project; the recorded race sits in BigQuery. You build the agent in the middle.</text>

  <!-- ====================== GCS + BigQuery (top middle) ====================== -->
  <!-- GCS bucket icon -->
  <path d="M 296 100 L 344 100 L 336 142 L 304 142 Z" fill="#aecbfa" stroke="#174ea6" stroke-width="1.5"/>
  <ellipse cx="320" cy="100" rx="24" ry="7" fill="#d2e3fc" stroke="#174ea6" stroke-width="1.5"/>
  <text x="320" y="162" font-size="14" text-anchor="middle" fill="#3c4043">GCS</text>
  <line x1="350" y1="118" x2="398" y2="118" stroke="#5f6368" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- BigQuery cylinder -->
  <path d="M 405 92 v 78 a 105 17 0 0 0 210 0 v -78" fill="#e8f0fe" stroke="#174ea6" stroke-width="1.8"/>
  <ellipse cx="510" cy="92" rx="105" ry="17" fill="#e8f0fe" stroke="#174ea6" stroke-width="1.8"/>
  <text x="510" y="130" font-size="16" font-weight="700" text-anchor="middle" fill="#174ea6">BigQuery</text>
  <text x="510" y="150" font-size="13" text-anchor="middle" fill="#3c4043">race history · fe_race10</text>
  <text x="510" y="167" font-size="12" text-anchor="middle" fill="#5f6368">laps · energy · overtakes · careers</text>

  <!-- ====================== LEFT PANEL: Race Replay ====================== -->
  <rect x="40" y="210" width="300" height="430" rx="12" fill="#f1f3f4"/>
  <text x="62" y="244" font-size="20" font-weight="700" fill="#202124">Race Replay</text>
  <rect x="252" y="226" width="70" height="22" rx="11" fill="#e8eaed" stroke="#9aa0a6" stroke-width="1"/>
  <text x="287" y="241" font-size="11" font-weight="700" text-anchor="middle" fill="#5f6368">GIVEN</text>
  <text x="62" y="264" font-size="12" fill="#5f6368">deployed by setup/all.sh</text>

  <rect x="70" y="284" width="240" height="66" rx="8" fill="#ffffff" stroke="#dadce0" stroke-width="1.5"/>
  <text x="190" y="311" font-size="16" font-weight="600" text-anchor="middle" fill="#202124">Simulator</text>
  <text x="190" y="331" font-size="12" text-anchor="middle" fill="#5f6368">Cloud Run · fe-simulator</text>

  <line x1="190" y1="350" x2="190" y2="392" stroke="#5f6368" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="200" y="376" font-size="11" fill="#5f6368">1 Hz frames</text>

  <rect x="70" y="396" width="240" height="54" rx="8" fill="#e8f0fe" stroke="#174ea6" stroke-width="1.5"/>
  <text x="190" y="429" font-size="16" font-weight="600" text-anchor="middle" fill="#174ea6">Pub/Sub</text>

  <line x1="190" y1="450" x2="190" y2="492" stroke="#5f6368" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="200" y="476" font-size="11" fill="#5f6368">push (OIDC)</text>

  <rect x="70" y="496" width="240" height="66" rx="8" fill="#ffffff" stroke="#dadce0" stroke-width="1.5"/>
  <text x="190" y="523" font-size="16" font-weight="600" text-anchor="middle" fill="#202124">State Writer</text>
  <text x="190" y="543" font-size="12" text-anchor="middle" fill="#5f6368">Cloud Run · fe-state-writer</text>

  <!-- ====================== MIDDLE: Toolbox + Firestore ====================== -->
  <rect x="405" y="306" width="210" height="66" rx="8" fill="#ffffff" stroke="#dadce0" stroke-width="1.5"/>
  <text x="510" y="333" font-size="16" font-weight="600" text-anchor="middle" fill="#202124">MCP Toolbox</text>
  <text x="510" y="353" font-size="12" text-anchor="middle" fill="#5f6368">Cloud Run · fe-toolbox</text>
  <line x1="510" y1="304" x2="510" y2="196" stroke="#5f6368" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Firestore cylinder -->
  <path d="M 405 522 v 72 a 105 17 0 0 0 210 0 v -72" fill="#e8f0fe" stroke="#174ea6" stroke-width="1.8"/>
  <ellipse cx="510" cy="522" rx="105" ry="17" fill="#e8f0fe" stroke="#174ea6" stroke-width="1.8"/>
  <text x="510" y="558" font-size="16" font-weight="700" text-anchor="middle" fill="#174ea6">Firestore</text>
  <text x="510" y="578" font-size="13" text-anchor="middle" fill="#3c4043">live race state + events</text>

  <line x1="310" y1="529" x2="398" y2="540" stroke="#5f6368" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- ====================== AGENT PANEL ====================== -->
  <rect x="690" y="210" width="280" height="430" rx="12" fill="#f1f3f4"/>
  <text x="712" y="244" font-size="20" font-weight="700" fill="#202124">The Agent</text>
  <rect x="852" y="226" width="100" height="22" rx="11" fill="#137333"/>
  <text x="902" y="241" font-size="11" font-weight="700" text-anchor="middle" fill="#ffffff">YOU BUILD</text>
  <text x="712" y="264" font-size="12" fill="#5f6368">ADK + Gemini · starter/race_engineer/</text>

  <!-- Tier cards -->
  <g>
    <rect x="712" y="280" width="236" height="70" rx="8" fill="#e6f4ea" stroke="#137333" stroke-width="1.5"/>
    <circle cx="738" cy="315" r="14" fill="#137333"/>
    <text x="738" y="319" font-size="10" font-weight="700" text-anchor="middle" fill="#ffffff">A–C</text>
    <text x="762" y="310" font-size="15" font-weight="600" fill="#202124">Build · ground · curate</text>
    <text x="762" y="330" font-size="11.5" font-family="Consolas, monospace" fill="#5f6368">agent.py — created in place</text>
  </g>
  <g>
    <rect x="712" y="364" width="236" height="70" rx="8" fill="#e6f4ea" stroke="#137333" stroke-width="1.5"/>
    <circle cx="738" cy="399" r="14" fill="#137333"/>
    <text x="738" y="404" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">D</text>
    <text x="762" y="394" font-size="15" font-weight="600" fill="#202124">Adopt the given parts</text>
    <text x="762" y="414" font-size="11.5" font-family="Consolas, monospace" fill="#5f6368">frame tools + prompt link</text>
  </g>
  <g>
    <rect x="712" y="448" width="236" height="70" rx="8" fill="#e6f4ea" stroke="#137333" stroke-width="1.5"/>
    <circle cx="738" cy="483" r="14" fill="#137333"/>
    <text x="738" y="488" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">E</text>
    <text x="762" y="478" font-size="15" font-weight="600" fill="#202124">Persona</text>
    <text x="762" y="498" font-size="11.5" font-family="Consolas, monospace" fill="#5f6368">prompts.py</text>
  </g>
  <g>
    <rect x="712" y="532" width="236" height="84" rx="8" fill="#fef7e0" stroke="#b06000" stroke-width="1.5" stroke-dasharray="6 3"/>
    <circle cx="738" cy="574" r="14" fill="#b06000"/>
    <text x="738" y="579" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">F</text>
    <text x="762" y="558" font-size="15" font-weight="600" fill="#202124">Triggers &amp; scorer</text>
    <text x="762" y="578" font-size="11.5" font-family="Consolas, monospace" fill="#5f6368">shared/scorer.py</text>
    <text x="762" y="598" font-size="11" font-style="italic" fill="#b06000">runs inside the pit-wall frontend</text>
  </g>

  <!-- Agent <-> data arrows -->
  <line x1="688" y1="392" x2="622" y2="350" stroke="#5f6368" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="630" y="378" font-size="12" font-weight="600" text-anchor="middle" fill="#3c4043">14 tools</text>
  <text x="630" y="393" font-size="12" text-anchor="middle" fill="#5f6368">(then)</text>

  <line x1="688" y1="556" x2="622" y2="556" stroke="#5f6368" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="654" y="544" font-size="12" font-weight="600" text-anchor="middle" fill="#3c4043">frame tools</text>
  <text x="654" y="576" font-size="12" text-anchor="middle" fill="#5f6368">(now)</text>

  <!-- Agent <-> pit wall arrow drawn AFTER the pit wall panel (see below) -->

  <!-- ====================== PIT WALL PANEL ====================== -->
  <rect x="1020" y="210" width="340" height="430" rx="12" fill="#f1f3f4"/>
  <text x="1042" y="244" font-size="20" font-weight="700" fill="#202124">Pit Wall</text>
  <rect x="1272" y="226" width="70" height="22" rx="11" fill="#e8eaed" stroke="#9aa0a6" stroke-width="1"/>
  <text x="1307" y="241" font-size="11" font-weight="700" text-anchor="middle" fill="#5f6368">GIVEN</text>
  <text x="1042" y="264" font-size="12" fill="#5f6368">frontend/ · runs in your Cloud Shell</text>

  <!-- browser window -->
  <rect x="1052" y="352" width="216" height="156" rx="10" fill="#ffffff" stroke="#dadce0" stroke-width="1.5"/>
  <path d="M 1052 362 a 10 10 0 0 1 10 -10 h 196 a 10 10 0 0 1 10 10 v 14 h -216 z" fill="#4285f4"/>
  <circle cx="1068" cy="364" r="4" fill="#ffffff" opacity="0.85"/>
  <circle cx="1082" cy="364" r="4" fill="#ffffff" opacity="0.85"/>
  <circle cx="1096" cy="364" r="4" fill="#ffffff" opacity="0.85"/>
  <!-- headset glyph -->
  <path d="M 1138 442 a 22 22 0 0 1 44 0" fill="none" stroke="#3c4043" stroke-width="4"/>
  <rect x="1132" y="438" width="11" height="20" rx="5" fill="#3c4043"/>
  <rect x="1177" y="438" width="11" height="20" rx="5" fill="#3c4043"/>
  <text x="1160" y="486" font-size="15" font-weight="600" text-anchor="middle" fill="#202124">Pit Wall UI</text>
  <text x="1160" y="502" font-size="11" text-anchor="middle" fill="#5f6368">tower · radio log · SIM bar</text>

  <!-- STT / TTS cards -->
  <text x="1322" y="296" font-size="12" font-weight="600" text-anchor="middle" fill="#3c4043">voice in</text>
  <rect x="1282" y="304" width="80" height="56" rx="8" fill="#fef7e0" stroke="#b06000" stroke-width="1.5"/>
  <text x="1322" y="328" font-size="13" font-weight="600" text-anchor="middle" fill="#202124">Chirp</text>
  <text x="1322" y="346" font-size="13" font-weight="600" text-anchor="middle" fill="#202124">STT</text>
  <line x1="1300" y1="362" x2="1276" y2="384" stroke="#5f6368" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="1282" y="478" width="80" height="56" rx="8" fill="#fef7e0" stroke="#b06000" stroke-width="1.5"/>
  <text x="1322" y="502" font-size="13" font-weight="600" text-anchor="middle" fill="#202124">Chirp</text>
  <text x="1322" y="520" font-size="13" font-weight="600" text-anchor="middle" fill="#202124">TTS</text>
  <line x1="1276" y1="470" x2="1300" y2="492" stroke="#5f6368" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="1322" y="556" font-size="12" font-weight="600" text-anchor="middle" fill="#3c4043">voice out</text>

  <!-- Agent <-> pit wall (on top of the panel) -->
  <line x1="972" y1="430" x2="1050" y2="430" stroke="#5f6368" stroke-width="1.8" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="1011" y="412" font-size="12" font-weight="600" text-anchor="middle" fill="#3c4043">triggers + Q&amp;A</text>

  <!-- ====================== TIER BAR ====================== -->
  <g font-size="13" font-weight="600">
    <rect x="690" y="664" width="104" height="34" rx="6" fill="#ceead6" stroke="#137333" stroke-width="1.3"/>
    <text x="742" y="686" text-anchor="middle" fill="#0d652d">A · build it</text>
    <rect x="802" y="664" width="104" height="34" rx="6" fill="#ceead6" stroke="#137333" stroke-width="1.3"/>
    <text x="854" y="686" text-anchor="middle" fill="#0d652d">B · ground it</text>
    <rect x="914" y="664" width="104" height="34" rx="6" fill="#ceead6" stroke="#137333" stroke-width="1.3"/>
    <text x="966" y="686" text-anchor="middle" fill="#0d652d">C · curate it</text>
    <rect x="1026" y="664" width="104" height="34" rx="6" fill="#ceead6" stroke="#137333" stroke-width="1.3"/>
    <text x="1078" y="686" text-anchor="middle" fill="#0d652d">D · go live</text>
    <rect x="1138" y="664" width="104" height="34" rx="6" fill="#ceead6" stroke="#137333" stroke-width="1.3"/>
    <text x="1190" y="686" text-anchor="middle" fill="#0d652d">E · persona</text>
    <rect x="1250" y="664" width="110" height="34" rx="6" fill="#fde293" stroke="#b06000" stroke-width="1.3"/>
    <text x="1305" y="686" text-anchor="middle" fill="#7f4f00">F · stretch</text>
  </g>
  <text x="682" y="686" font-size="12" text-anchor="end" fill="#5f6368">stop anywhere with something working →</text>

  <!-- ====================== BONUS STRIP ====================== -->
  <rect x="40" y="726" width="1320" height="62" rx="12" fill="#f1f3f4"/>
  <text x="64" y="763" font-size="14" font-weight="600" fill="#3c4043">Bonus board — if you finish early</text>
  <g font-size="12.5" text-anchor="middle">
    <rect x="380" y="742" width="110" height="30" rx="15" fill="#fef7e0" stroke="#b06000" stroke-width="1.3" stroke-dasharray="5 3"/>
    <text x="435" y="761" fill="#7f4f00">Voice picker</text>
    <rect x="504" y="742" width="128" height="30" rx="15" fill="#fef7e0" stroke="#b06000" stroke-width="1.3" stroke-dasharray="5 3"/>
    <text x="568" y="761" fill="#7f4f00">Tool-call panel</text>
    <rect x="646" y="742" width="116" height="30" rx="15" fill="#fef7e0" stroke="#b06000" stroke-width="1.3" stroke-dasharray="5 3"/>
    <text x="704" y="761" fill="#7f4f00">Race debrief</text>
    <rect x="776" y="742" width="142" height="30" rx="15" fill="#fef7e0" stroke="#b06000" stroke-width="1.3" stroke-dasharray="5 3"/>
    <text x="847" y="761" fill="#7f4f00">Re-cast: rival car</text>
    <rect x="932" y="742" width="142" height="30" rx="15" fill="#fef7e0" stroke="#b06000" stroke-width="1.3" stroke-dasharray="5 3"/>
    <text x="1003" y="761" fill="#7f4f00">Portuguese radio</text>
    <rect x="1088" y="742" width="110" height="30" rx="15" fill="#fef7e0" stroke="#b06000" stroke-width="1.3" stroke-dasharray="5 3"/>
    <text x="1143" y="761" fill="#7f4f00">Eval harness</text>
    <rect x="1212" y="742" width="130" height="30" rx="15" fill="#fef7e0" stroke="#b06000" stroke-width="1.3" stroke-dasharray="5 3"/>
    <text x="1277" y="761" fill="#7f4f00">Ship to the cloud</text>
  </g>
</svg>
